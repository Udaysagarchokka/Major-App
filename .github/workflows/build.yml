name: Build SecureScan APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies + Java 17
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-17-openjdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer
          pip install --upgrade Cython==0.29.33 virtualenv wheel

      - name: Set up Android SDK with sdkmanager
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"

          # Download and install cmdline-tools (contains sdkmanager)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p "$SDK_DIR/cmdline-tools"
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extracted
          mv /tmp/cmdtools_extracted/cmdline-tools "$SDK_DIR/cmdline-tools/latest"

          # Accept all licenses non-interactively
          mkdir -p "$SDK_DIR/licenses"
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > "$SDK_DIR/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$SDK_DIR/licenses/android-sdk-preview-license"
          printf "504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK_DIR/licenses/intel-android-extra-license"

          # Install platform-tools and build-tools via sdkmanager
          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --sdk_root="$SDK_DIR" "platform-tools" "build-tools;34.0.0" "platforms;android-33"

          # Create legacy tools/bin/sdkmanager symlink that Buildozer expects
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager" "$SDK_DIR/tools/bin/avdmanager"

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v6-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v6-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          buildozer android debug 2>&1 | tee build.log
          ls bin/*.apk || (echo "ERROR: No APK found in bin/" && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureScan-APK
          path: bin/*.apk

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log